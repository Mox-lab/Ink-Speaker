# ============================================================
# Ink Realm docker-compose 编排(单机版,适配 4GB 服务器)
# ============================================================
# 组件:
#   - postgres: pgvector 向量库(降低内存至 512MB)
#   - redis:    L2 缓存 + ShedLock(关闭 AOF,降低 IO 压力)
#   - ink-realm: 业务应用(后端 Spring Boot)
#   - nginx:     前端静态托管 + 反向代理
#
# 资源分配(4GB 总量):
#   - postgres:     512MB
#   - redis:        96MB
#   - ink-realm:  2048MB(-Xmx 约 1.4GB + 元空间 + 堆外)
#   - nginx:        64MB
#   - 系统 + Docker: ~500MB
#   - 预留:         ~800MB(避免 OOM kill)
#
# 端口暴露策略:
#   - 80   nginx 对外(用户访问入口)
#   - 22   SSH(由系统管,不在此处)
#   - 9688 后端业务端口仅本机(由 nginx 反代)
#   - 9689 Actuator 端口仅本机(运维诊断用)
#   - 5432 PostgreSQL 仅本机
#   - 6379 Redis 仅本机
# ============================================================

services:

  # ------------------------------------------------------------
  # PostgreSQL 16 + pgvector 向量库
  # ------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ink-realm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ink_realm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"            # 仅本机访问,不对外暴露
    volumes:
      - ${DATA_DIR:-/opt/ink-realm/data}/postgres:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"             # 4GB 服务器不要设太大
      - "-c"
      - "shared_buffers=128MB"           # 1/4 内存,标准建议
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_buffers=4MB"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ink-realm-net

  # ------------------------------------------------------------
  # Redis 7(L2 缓存 + ShedLock 后端)
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ink-realm-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"            # 仅本机访问
    command:
      - "redis-server"
      - "--maxmemory"
      - "64mb"                            # 4GB 服务器,Redis 给 64MB 够 L2 缓存用
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""                                # 关闭 RDB,降低 IO(缓存可重建)
      - "--appendonly"
      - "no"                              # 关闭 AOF
    deploy:
      resources:
        limits:
          memory: 96M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ink-realm-net

  # ------------------------------------------------------------
  # Ink Realm 后端应用
  # ------------------------------------------------------------
  ink-realm:
    # 阿里云 ACR 镜像地址,从 .env.prod 注入(避免硬编码命名空间)
    image: ${ACR_REGISTRY:-registry.cn-shenzhen.aliyuncs.com}/${ACR_NAMESPACE:-mox-lab}/ink-realm:latest
    container_name: ink-realm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ink_realm}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # 敏感字段(必填,生产从 .env 注入)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JASYPT_KEY: ${JASYPT_KEY:-ink-realm-prod-key}
      # 知识库目录指向挂载卷(与 volumes 中的 /app/knowledge-base 对应)
      INK_KNOWLEDGE_BASE_DIR: /app/knowledge-base
      # JVM 参数:容器限制 2GB,-Xmx 设 1.4GB,留堆外/元空间
      JAVA_OPTS: >-
        -XX:InitialRAMPercentage=50
        -XX:MaxRAMPercentage=70
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:MetaspaceSize=256m
        -XX:MaxMetaspaceSize=384m
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heapdump.hprof
        -XX:+ExitOnOutOfMemoryError
        -Duser.timezone=Asia/Shanghai
        -Dfile.encoding=UTF-8
    ports:
      - "127.0.0.1:9688:9688"            # 仅本机访问,由 nginx 反代对外
      - "127.0.0.1:9689:9689"            # Actuator 仅本机(运维 SSH 隧道访问)
    volumes:
      - ${DATA_DIR:-/opt/ink-realm/data}/logs:/app/logs
      - ${DATA_DIR:-/opt/ink-realm/data}/knowledge-base:/app/knowledge-base
    deploy:
      resources:
        limits:
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9689/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - ink-realm-net

  # ------------------------------------------------------------
  # Nginx 前端 + 反向代理(用户访问入口)
  # ------------------------------------------------------------
  nginx:
    image: ${ACR_REGISTRY:-registry.cn-shenzhen.aliyuncs.com}/${ACR_NAMESPACE:-mox-lab}/ink-realm-web:latest
    container_name: ink-realm-nginx
    restart: unless-stopped
    depends_on:
      ink-realm:
        condition: service_healthy
    ports:
      - "80:80"                           # 对外暴露 80 端口
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ink-realm-net

networks:
  ink-realm-net:
    driver: bridge